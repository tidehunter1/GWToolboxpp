name: Cleanup old workflow runs

on:
  workflow_dispatch:
    inputs:
      keep_minimum_runs:
        description: 'Number of most recent runs to keep, per workflow'
        required: true
        default: '3'

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: ${{ github.event.inputs.keep_minimum_runs }}
